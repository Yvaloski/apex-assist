<div class="container palette-3">
  <div class="hud-interface-wrapper">

    <header app-hud-header class="hud-header"></header>

    <main class="hud-main-grid">

      <section app-telemetry-monitor class="widget-panel system-metrics-panel"></section>

      <section class="center-stage">
        <div class="core-orb-container" [ngClass]="stateClass()">
          <div class="glow-backdrop"></div>

          <div app-apex-core-orb [state]="state()" class="blobs"></div>

          <div class="core-readout">
            <div class="digital-label">COGNITIVE_CORE</div>
            <div class="digital-state">{{ state() }}</div>
          </div>
        </div>

        <div app-control-panel class="control-panel"></div>
      </section>

      <section app-logstream class="widget-panel streaming-text-panel"></section>
    </main>

    <footer app-hud-footer class="hud-footer"></footer>
  </div>
</div>
